version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "npm"
    directory: "/backend"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/frontend"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 10
